services:
  app:
    build: .
    container_name: notes-api

    ports:
      - "3000:3000"

    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/notesdb

    depends_on:
      - db

  db:
    image: postgres:17

    container_name: postgres-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notesdb

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: